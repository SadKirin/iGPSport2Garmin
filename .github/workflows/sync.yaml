name: iGPSport to Garmin Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:        # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 缓存 Garmin Token，避免每次运行都重新登录
      - name: Cache Garmin tokens
        uses: actions/cache@v4
        with:
          # python-garminconnect 0.3.0+ 默认将 token 存在 ~/.garminconnect/
          # 为了在 Job 间持久化，我们缓存整个目录
          path: ~/.garminconnect
          key: ${{ runner.os }}-garmin-token
          restore-keys: |
            ${{ runner.os }}-garmin-token-
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run sync script
        env:
          IGPSPORT_USERNAME: ${{ secrets.IGPSPORT_USERNAME }}
          IGPSPORT_PASSWORD: ${{ secrets.IGPSPORT_PASSWORD }}
          IGPSPORT_REGION: ${{ secrets.IGPSPORT_REGION || 'cn' }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          # 可根据你的账号区域选择 'cn' 或 'com'
          GARMIN_DOMAIN: ${{ secrets.GARMIN_DOMAIN || 'com' }}
        run: python sync_igpsport_to_garmin.py
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f last_sync_date.json ]; then
            git add last_sync_date.json
          fi
          # 使用新库后，不再需要手动添加 token 文件到仓库
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last sync date [skip ci]"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
