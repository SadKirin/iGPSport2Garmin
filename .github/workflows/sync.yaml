name: iGPSport to Garmin Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Garmin tokens
        uses: actions/cache@v4
        with:
          path: ~/.garminconnect
          key: ${{ runner.os }}-garmin-token
          restore-keys: |
            ${{ runner.os }}-garmin-token-

      # 修复 mobile.integration.garmin.com DNS 解析问题
      - name: Fix Garmin mobile domain DNS
        run: |
          # 获取 mobile.integration.garmin.com 的 IP 地址
          IP=$(dig +short mobile.integration.garmin.com | head -1)
          if [ -n "$IP" ]; then
            echo "Resolved mobile.integration.garmin.com to $IP"
            echo "$IP mobile.integration.garmin.com" | sudo tee -a /etc/hosts
          else
            # 备用 IP（从公共记录获取，可能变化但大概率可用）
            echo "Using fallback IP for mobile.integration.garmin.com"
            echo "3.214.47.22 mobile.integration.garmin.com" | sudo tee -a /etc/hosts
          fi
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run sync script
        env:
          IGPSPORT_USERNAME: ${{ secrets.IGPSPORT_USERNAME }}
          IGPSPORT_PASSWORD: ${{ secrets.IGPSPORT_PASSWORD }}
          IGPSPORT_REGION: ${{ secrets.IGPSPORT_REGION || 'cn' }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_DOMAIN: ${{ secrets.GARMIN_DOMAIN || 'com' }}
        run: python sync_igpsport_to_garmin.py
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f last_sync_date.json ]; then
            git add last_sync_date.json
          fi
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last sync date [skip ci]"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
