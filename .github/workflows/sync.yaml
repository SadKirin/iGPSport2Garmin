name: iGPSport to Garmin Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin token file
        uses: actions/cache@v3
        with:
          path: garmin_token.json
          key: ${{ runner.os }}-garmin-token-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-garmin-token-
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run sync script
        env:
          IGPSPORT_USERNAME: ${{ secrets.IGPSPORT_USERNAME }}
          IGPSPORT_PASSWORD: ${{ secrets.IGPSPORT_PASSWORD }}
          IGPSPORT_REGION: ${{ secrets.IGPSPORT_REGION || 'cn' }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_DOMAIN: ${{ secrets.GARMIN_DOMAIN || 'garmin.com' }}
        run: python sync_igpsport_to_garmin.py
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f last_sync_date.json ]; then
            git add last_sync_date.json
            git diff --quiet && git diff --staged --quiet || git commit -m "Update last sync date [skip ci]"
          fi
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
